# ============================================
# 推理部署配置
# ============================================

defaults:
  - ../default

# --------------------------------------------
# 模型配置
# --------------------------------------------
model:
  # 检测模型
  detection:
    name: "DKGA-Det"
    checkpoint: "${paths.checkpoints}/detection/best.pth"
    onnx_path: "${paths.checkpoints}/detection/model.onnx"
    trt_path: "${paths.checkpoints}/detection/model.trt"
    ov_path: "${paths.checkpoints}/detection/model.xml"
    
  # 识别模型
  recognition:
    name: "DDFD-Rec"
    checkpoint: "${paths.checkpoints}/recognition/best.pth"
    onnx_path: "${paths.checkpoints}/recognition/model.onnx"
    trt_path: "${paths.checkpoints}/recognition/model.trt"
    ov_path: "${paths.checkpoints}/recognition/model.xml"

# --------------------------------------------
# TensorRT 配置
# --------------------------------------------
tensorrt:
  # 精度模式
  precision: "fp16"  # fp32/fp16/int8
  
  # 构建配置
  build:
    max_workspace_size: 4294967296  # 4GB
    max_batch_size: 32
    min_batch_size: 1
    opt_batch_size: 8
    
    # 优化配置
    tactic_sources: ["cublas", "cudnn"]
    builder_optimization_level: 3
    
    # INT8 量化配置
    int8:
      calibrator: "entropy"  # entropy/minmax
      cache_file: "${paths.checkpoints}/int8_cache.cache"
      num_calibration_images: 500
      
  # 推理配置
  inference:
    device_id: 0
    cuda_graph: true
    use_cuda_thread_local: true
    
  # 输入配置
  input:
    detection:
      shape: [1, 3, 640, 640]
      format: "NCHW"
      dtype: "fp32"
    recognition:
      shape: [1, 3, 112, 112]
      format: "NCHW"
      dtype: "fp32"

# --------------------------------------------
# OpenVINO 配置
# --------------------------------------------
openvino:
  precision: "FP16"  # FP32/FP16/INT8
  
  build:
    device: "CPU"  # CPU/GPU/MYRIAD
    optimization_level: 3
    
  inference:
    device: "CPU"
    num_requests: 4  # 异步推理请求数
    num_streams: 4  # CPU 流数

# --------------------------------------------
# ONNX Runtime 配置
# --------------------------------------------
onnxruntime:
  execution_provider: "CUDAExecutionProvider"  # CUDAExecutionProvider/CPUExecutionProvider
  
  session_options:
    graph_optimization_level: "ORT_ENABLE_ALL"
    intra_op_num_threads: 4
    inter_op_num_threads: 4
    enable_mem_pattern: true
    enable_mem_arena: true
    
  cuda:
    cudnn_conv_algo_search: "HEURISTIC"
    do_copy_in_default_stream: true

# --------------------------------------------
# 推理流水线配置
# --------------------------------------------
pipeline:
  # 处理流程
  stages:
    - "preprocess"
    - "detect"
    - "align"
    - "extract"
    - "match"
    
  # 批处理配置
  batching:
    enabled: true
    max_batch_size: 32
    timeout_ms: 50  # 等待批处理超时
    
  # 预处理配置
  preprocess:
    # 图像质量检查
    quality_check:
      enabled: true
      min_brightness: 30
      max_brightness: 220
      min_blur_score: 50
      min_face_size: 32
      
    # 归一化
    normalize: true
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    
  # 检测配置
  detect:
    min_face_size: 32
    max_faces: 50
    score_thresh: 0.6
    nms_thresh: 0.45
    
  # 对齐配置
  align:
    output_size: 112
    margin: 0
    scale_factor: 1.0
    
  # 特征提取配置
  extract:
    batch_size: 32
    normalize_feature: true
    
  # 匹配配置
  match:
    threshold: 0.6
    top_k: 10
    id_weight: 0.85
    attr_weight: 0.15
    
    # 质量过滤
    quality_filter:
      enabled: true
      min_quality: 0.5

# --------------------------------------------
# 特征索引配置
# --------------------------------------------
index:
  # 索引类型
  type: "hnsw"  # hnsw/faiss/brute
  
  # HNSW 配置
  hnsw:
    space: "cosine"  # cosine/l2
    dim: 512
    max_elements: 10000000  # 1000 万
    ef_construction: 200
    M: 16
    ef_search: 50
    num_threads: 8
    
  # Faiss 配置
  faiss:
    index_type: "IVF4096,PQ64"  # 索引类型
    nprobe: 32  # 搜索参数
    use_gpu: true
    gpu_resources: [0, 1]
    
  # 索引管理
  management:
    save_dir: "${paths.checkpoints}/index"
    save_freq: 1000  # 每 N 次添加后保存
    backup: true

# --------------------------------------------
# API 服务配置
# --------------------------------------------
api:
  # 服务器配置
  host: "0.0.0.0"
  port: 8000
  workers: 4
  worker_class: "uvicorn.workers.UvicornWorker"
  reload: false
  access_log: true
  
  # 超时配置
  timeout:
    keep_alive: 5
    request: 30
    graceful_shutdown: 10
    
  # CORS 配置
  cors:
    enabled: true
    origins: ["*"]
    methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    headers: ["Content-Type", "Authorization", "X-API-Key"]
    credentials: true
    max_age: 600
    
  # 认证配置
  auth:
    enabled: false
    type: "api_key"  # api_key/jwt/oauth2
    api_key_header: "X-API-Key"
    api_keys:
      - "your-api-key-1"
      - "your-api-key-2"
      
  # 限流配置
  rate_limit:
    enabled: false
    type: "sliding_window"  # fixed_window/sliding_window/token_bucket
    requests_per_minute: 60
    requests_per_hour: 1000
    burst: 10
    
  # 请求大小限制
  max_request_size: 10485760  # 10MB
  max_image_size: 5242880  # 5MB
  
  # 响应配置
  response:
    compress: true
    min_compress_size: 1024
    
  # 健康检查
  health:
    enabled: true
    path: "/health"
    check_interval: 30
    
  # 指标监控
  metrics:
    enabled: true
    path: "/metrics"
    prometheus: true

# --------------------------------------------
# API 路由配置
# --------------------------------------------
routes:
  # 检测接口
  detect:
    path: "/api/v1/detect"
    methods: ["POST"]
    max_batch_size: 10
    timeout: 5.0
    
  # 特征提取接口
  extract:
    path: "/api/v1/extract"
    methods: ["POST"]
    timeout: 3.0
    
  # 人脸验证接口 (1:1)
  verify:
    path: "/api/v1/verify"
    methods: ["POST"]
    timeout: 2.0
    
  # 人脸搜索接口 (1:N)
  search:
    path: "/api/v1/search"
    methods: ["POST"]
    timeout: 10.0
    
  # 特征库管理
  gallery:
    path: "/api/v1/gallery"
    methods: ["GET", "POST", "PUT", "DELETE"]
    
  # 系统状态
  status:
    path: "/api/v1/status"
    methods: ["GET"]

# --------------------------------------------
# 日志配置
# --------------------------------------------
logging:
  level: "INFO"  # DEBUG/INFO/WARNING/ERROR/CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # 文件日志
  file:
    enabled: true
    path: "${paths.logs}/api.log"
    max_size: 104857600  # 100MB
    backup_count: 10
    rotation: "size"  # size/time
    
  # 控制台日志
  console:
    enabled: true
    colorize: true
    
  # 结构化日志
  structured:
    enabled: false
    format: "json"
    
  # 访问日志
  access:
    enabled: true
    path: "${paths.logs}/access.log"
    
  # 慢请求日志
  slow_request:
    enabled: true
    threshold: 1.0  # 秒

# --------------------------------------------
# 监控配置
# --------------------------------------------
monitoring:
  # Prometheus 指标
  prometheus:
    enabled: true
    port: 9090
    
  # 性能监控
  performance:
    enabled: true
    sample_rate: 0.1  # 10% 采样
    
  # 告警配置
  alert:
    enabled: false
    channels: ["email", "slack", "webhook"]
    thresholds:
      error_rate: 0.05  # 5% 错误率
      latency_p99: 1.0  # 1 秒
      qps: 1000

# --------------------------------------------
# 数据库配置
# --------------------------------------------
database:
  # PostgreSQL (元数据存储)
  postgres:
    enabled: true
    host: "localhost"
    port: 5432
    database: "facerec"
    user: "postgres"
    password: "password"
    pool_size: 10
    max_overflow: 20
    pool_timeout: 30
    pool_recycle: 3600
    
  # Redis (缓存/队列)
  redis:
    enabled: true
    host: "localhost"
    port: 6379
    db: 0
    password: null
    max_connections: 50
    socket_timeout: 5
    socket_connect_timeout: 5
    
  # 对象存储
  storage:
    type: "local"  # local/minio/s3
    local:
      root: "${paths.root}/storage"
    minio:
      endpoint: "localhost:9000"
      bucket: "faces"
      access_key: "minioadmin"
      secret_key: "minioadmin"
      secure: false
    s3:
      bucket: "your-bucket"
      region: "us-east-1"

# --------------------------------------------
# 异常处理配置
# --------------------------------------------
error_handling:
  # 错误响应格式
  format:
    include_traceback: false
    include_details: true
    
  # 重试配置
  retry:
    enabled: true
    max_retries: 3
    backoff_factor: 0.1
    retry_on: ["timeout", "connection_error"]
    
  # 降级配置
  fallback:
    enabled: true
    use_cpu_on_gpu_error: true
    return_empty_on_error: true

# --------------------------------------------
# 安全配置
# --------------------------------------------
security:
  # 输入验证
  input_validation:
    enabled: true
    max_image_dimension: 4096
    allowed_formats: ["jpg", "jpeg", "png", "bmp", "webp"]
    
  # 输出脱敏
  output_masking:
    enabled: false
    mask_feature: false  # 是否脱敏特征向量
    
  # HTTPS
  https:
    enabled: false
    cert_file: "/path/to/cert.pem"
    key_file: "/path/to/key.pem"

# --------------------------------------------
# Docker 配置
# --------------------------------------------
docker:
  base_image: "nvidia/cuda:12.0-cudnn8-runtime-ubuntu22.04"
  python_version: "3.10"
  expose_ports: [8000, 9090]
  volumes:
    - "./checkpoints:/app/checkpoints"
    - "./logs:/app/logs"
    - "./storage:/app/storage"
  environment:
    - "CUDA_VISIBLE_DEVICES=0"
    - "PYTHONUNBUFFERED=1"
  resources:
    gpu: true
    memory: "8g"
    cpus: "4"
